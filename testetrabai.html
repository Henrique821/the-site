<!DOCTYPE html>
<head>
  <title>Catálogo de Artes Marciais</title>
  <style>
    body {
      background-color: #a02222;
    }

    .header {
      background-color: #252525;
      color: rgb(255, 255, 255);
      text-align: center;
      padding: 20px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .column {
      width: 300px;
      margin: 10px;
    }

    .card {
      background-color: #640909;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius:8px;
    }

    .card h3 {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Catálogo de Artes Marciais</h1>
  <p>Explore diferentes estilos de luta</p>
</div>

<div class="row">

  <div class="column">
    <div class="card">
      <img src="https://i.pinimg.com/736x/14/d1/9b/14d19be43d586424873688b57776fc22.jpg" alt="Capoeira">
      <h3>Capoeira</h3>
      <p>Arte marcial brasileira que mistura luta, dança, música e acrobacias.</p>
    </div>
  </div>

  <div class="column">
    <div class="card">
      <img src="https://static.significados.com.br/foto/muay-thai-og.jpg?class=ogImageSquare" alt="Muay Thai">
      <h3>Muay Thai</h3>
      <p>Arte marcial tailandesa que utiliza golpes com punhos, cotovelos, joelhos e canelas.</p>
    </div>
  </div>

  <div class="column">
    <div class="card">
       <a href="default.asp"><img src="https://img.freepik.com/fotos-gratis/dois-pugilistas-musculosos-tem-uma-competicao-no-ringue-eles-estao-usando-capacetes-e-luvas_613910-13128.jpg?semt=ais_hybrid&w=740&q=80" alt="boxe" style="width:270px;height:250px;"></a>
      <h3>Boxe</h3>
    </div>
  </div>

  <div class="column">
    <div class="card">
     
      <a href="default.asp"><img src="file:///C:/Users/IFMT-Aluno/Downloads/bjj.jpg" alt="Jiu-Jitsu Brasileiro" style="width:270px;height:250px;"></a>
      <h3>Jiu-Jitsu Brasileiro</h3>
</body>
</html>
